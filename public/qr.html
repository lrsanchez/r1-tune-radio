<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>R1 Radio — Install</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      background: #0b0c10;
      color: #F0EDE8;
      font-family: "IBM Plex Mono", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      margin: 0;
    }
    .label { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: #70747e; }
    .label b { color: #FF4500; }
    #qr { background: #fff; padding: 16px; border-radius: 14px; box-shadow: 0 0 40px rgba(255,69,0,.15); }
    #url { font-size: 11px; color: #FF4500; letter-spacing: .08em; }
    .hint { font-size: 10px; color: #70747e; letter-spacing: .18em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="label">RABBIT R1 · <b>TUNING DIAL</b></div>
  <div id="qr"></div>
  <div id="url"></div>
  <div class="hint">scan with R1 to install creation</div>
  <script>
    const origin = window.location.origin;
    document.getElementById('url').textContent = origin;
    const payload = JSON.stringify({
      title: "R1 Radio",
      url: origin,
      description: "Internet radio tuning dial for Rabbit R1",
      themeColor: "#FF4500"
    });
    new QRCode(document.getElementById('qr'), {
      text: payload,
      width: 256,
      height: 256,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  </script>
</body>
</html>
